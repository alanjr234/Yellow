<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hii!</title>
    <style>
        :root {
            --bg-color: #fffdf0;
            --text-brown: #422006;
            --accent-yellow: #fde047;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-brown);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .greeting-container {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1.5s forwards;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #ca8a04;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-style: italic;
        }

        .start-btn {
            background-color: var(--accent-yellow);
            color: var(--text-brown);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(202, 138, 4, 0.2);
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Subtle sun rays in the background */
        .sun {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: var(--accent-yellow);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="sun"></div>

    <div class="greeting-container">
        <h1>Hii prettyy ladyy ✨</h1>
        <p>I made a little something for you...</p>
        
        <button class="start-btn" onclick="startExperience()">
            Open it?
        </button>
    </div>

    <script>
        function startExperience() {
            // This goes to the Yellow Person list page
            window.location.href = "yellow.html"; 
        }
    </script>
</body>
</html>
